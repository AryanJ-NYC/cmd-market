services:
  postgres:
    image: postgres:16-alpine
    container_name: cmd-market-postgres
    environment:
      POSTGRES_DB: cmd_market
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5433:5432"
    volumes:
      - cmd-market-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cmd_market"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cmd-market-postgres-data:
